<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Calendrier Astreintes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a18;padding:1rem}
.wrap{max-width:780px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.nav-btn{background:none;border:1px solid #d3d1c7;border-radius:8px;padding:8px 14px;cursor:pointer;color:#1a1a18;font-size:13px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.nav-btn:hover{background:#f1efe8}
.month-title{font-size:16px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-label{font-size:10px;color:#888780;text-align:center;padding:3px 0;font-weight:500}
.day-cell{border-radius:6px;border:0.5px solid #d3d1c7;padding:4px 4px 3px;position:relative;background:#fff;min-height:52px}
.day-cell.other-month{opacity:.3}
.day-cell.today{border-color:#1a1a18;border-width:1.5px}
.day-num{font-size:11px;color:#888780;margin-bottom:3px;font-weight:500;line-height:1}
.day-cell.today .day-num{color:#185fa5;font-weight:600}
.week-badge{font-size:9px;font-weight:500;border-radius:3px;padding:2px 3px;display:block;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(min-width:480px){.cal-grid{gap:4px}.day-cell{min-height:62px;padding:5px 5px 4px}.day-num{font-size:12px;margin-bottom:4px}.week-badge{font-size:10px;padding:2px 4px}.day-label{font-size:11px}}
@media(min-width:640px){.day-cell{min-height:70px;padding:6px 6px 4px}.week-badge{font-size:11px}}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:.875rem}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#5f5e5a}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.gen-footer{text-align:center;font-size:11px;color:#b4b2a9;margin-top:1rem}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<div class="card-title">Calendrier Astreintes</div>
<div class="nav-row"><button class="nav-btn" onclick="changeMonth(-1)">←</button><span class="month-title" id="month-title"></span><button class="nav-btn" onclick="changeMonth(1)">→</button></div>
<div class="cal-grid" id="cal-grid"></div>
<div class="legend" id="legend"></div>
</div></div>
<div class="gen-footer">Généré le 22 juin 2026</div>
<script>
var TODAY=new Date();
var curYear=TODAY.getFullYear(),curMonth=TODAY.getMonth();
var DATA={"teamMembers":[{"id":"1","name":"Heiarii","color":"#ff2600"},{"id":"2","name":"Thierry","color":"#10B981"},{"id":"3","name":"Stanley","color":"#F59E0B"},{"id":"4","name":"Anthony","color":"#00a3d7"},{"id":"5","name":"Claude","color":"#8B5CF6"}],"schedules":[{"memberId":"1","startDate":"2024-07-30"},{"memberId":"5","startDate":"2024-08-06"},{"memberId":"2","startDate":"2024-08-13"},{"memberId":"4","startDate":"2024-08-20"},{"memberId":"1","startDate":"2024-08-27"},{"memberId":"5","startDate":"2024-09-03"},{"memberId":"2","startDate":"2024-09-10"},{"memberId":"3","startDate":"2024-09-17"},{"memberId":"4","startDate":"2024-09-24"},{"memberId":"5","startDate":"2024-10-01"},{"memberId":"3","startDate":"2024-10-08"},{"memberId":"2","startDate":"2024-10-15"},{"memberId":"1","startDate":"2024-10-22"},{"memberId":"4","startDate":"2024-10-29"},{"memberId":"5","startDate":"2024-11-05"},{"memberId":"3","startDate":"2024-11-12"},{"memberId":"2","startDate":"2024-11-19"},{"memberId":"1","startDate":"2024-11-26"},{"memberId":"4","startDate":"2024-12-03"},{"memberId":"3","startDate":"2024-12-10"},{"memberId":"5","startDate":"2024-12-17"},{"memberId":"2","startDate":"2024-12-24"},{"memberId":"1","startDate":"2024-12-31"},{"memberId":"4","startDate":"2025-01-07"},{"memberId":"3","startDate":"2025-01-14"},{"memberId":"5","startDate":"2025-01-21"},{"memberId":"2","startDate":"2025-01-28"},{"memberId":"1","startDate":"2025-02-04"},{"memberId":"2","startDate":"2025-02-11"},{"memberId":"3","startDate":"2025-02-18"},{"memberId":"5","startDate":"2025-02-25"},{"memberId":"2","startDate":"2025-03-04"},{"memberId":"1","startDate":"2025-03-11"},{"memberId":"4","startDate":"2025-03-18"},{"memberId":"3","startDate":"2025-03-25"},{"memberId":"5","startDate":"2025-04-01"},{"memberId":"2","startDate":"2025-04-08"},{"memberId":"1","startDate":"2025-04-15"},{"memberId":"5","startDate":"2025-04-22"},{"memberId":"4","startDate":"2025-04-29"},{"memberId":"5","startDate":"2025-05-06"},{"memberId":"1","startDate":"2025-05-13"},{"memberId":"3","startDate":"2025-05-20"},{"memberId":"4","startDate":"2025-05-27"},{"memberId":"3","startDate":"2025-06-03"},{"memberId":"5","startDate":"2025-06-10"},{"memberId":"2","startDate":"2025-06-17"},{"memberId":"3","startDate":"2025-06-24"},{"memberId":"4","startDate":"2025-07-01"},{"memberId":"1","startDate":"2025-07-08"},{"memberId":"4","startDate":"2025-07-15"},{"memberId":"5","startDate":"2025-07-22"},{"memberId":"1","startDate":"2025-07-29"},{"memberId":"2","startDate":"2025-08-05"},{"memberId":"5","startDate":"2025-08-12"},{"memberId":"4","startDate":"2025-08-19"},{"memberId":"2","startDate":"2025-08-26"},{"memberId":"1","startDate":"2025-09-02"},{"memberId":"4","startDate":"2025-09-09"},{"memberId":"3","startDate":"2025-09-16"},{"memberId":"2","startDate":"2025-09-23"},{"memberId":"3","startDate":"2025-09-30"},{"memberId":"1","startDate":"2025-10-07"},{"memberId":"4","startDate":"2025-10-14"},{"memberId":"3","startDate":"2025-10-21"},{"memberId":"4","startDate":"2025-10-28"},{"memberId":"2","startDate":"2025-11-04"},{"memberId":"1","startDate":"2025-11-11"},{"memberId":"4","startDate":"2025-11-18"},{"memberId":"3","startDate":"2025-11-25"},{"memberId":"4","startDate":"2025-12-02"},{"memberId":"2","startDate":"2025-12-09"},{"memberId":"1","startDate":"2025-12-16"},{"memberId":"4","startDate":"2025-12-23"},{"memberId":"5","startDate":"2025-12-30"},{"memberId":"4","startDate":"2026-01-06"},{"memberId":"2","startDate":"2026-01-13"},{"memberId":"1","startDate":"2026-01-20"},{"memberId":"3","startDate":"2026-01-27"},{"memberId":"5","startDate":"2026-02-03"},{"memberId":"4","startDate":"2026-02-10"},{"memberId":"2","startDate":"2026-02-17"},{"memberId":"1","startDate":"2026-02-24"},{"memberId":"5","startDate":"2026-03-03"},{"memberId":"3","startDate":"2026-03-10"},{"memberId":"4","startDate":"2026-03-17"},{"memberId":"2","startDate":"2026-03-24"},{"memberId":"1","startDate":"2026-03-31"},{"memberId":"3","startDate":"2026-04-07"},{"memberId":"5","startDate":"2026-04-14"},{"memberId":"2","startDate":"2026-04-21"},{"memberId":"5","startDate":"2026-04-28"},{"memberId":"3","startDate":"2026-05-05"},{"memberId":"1","startDate":"2026-05-12"},{"memberId":"5","startDate":"2026-05-19"},{"memberId":"4","startDate":"2026-05-26"},{"memberId":"5","startDate":"2026-06-02"},{"memberId":"3","startDate":"2026-06-09"},{"memberId":"1","startDate":"2026-06-16"},{"memberId":"5","startDate":"2026-06-23"},{"memberId":"1","startDate":"2026-06-30"},{"memberId":"4","startDate":"2026-07-07"},{"memberId":"2","startDate":"2026-07-14"},{"memberId":"1","startDate":"2026-07-21"},{"memberId":"2","startDate":"2026-07-28"},{"memberId":"4","startDate":"2026-08-04"},{"memberId":"3","startDate":"2026-08-11"},{"memberId":"1","startDate":"2026-08-18"},{"memberId":"3","startDate":"2026-08-25"},{"memberId":"5","startDate":"2026-09-01"},{"memberId":"4","startDate":"2026-09-08"},{"memberId":"2","startDate":"2026-09-15"},{"memberId":"1","startDate":"2026-09-22"},{"memberId":"3","startDate":"2026-09-29"},{"memberId":"5","startDate":"2026-10-06"},{"memberId":"4","startDate":"2026-10-13"},{"memberId":"2","startDate":"2026-10-20"},{"memberId":"1","startDate":"2026-10-27"},{"memberId":"4","startDate":"2026-11-03"},{"memberId":"3","startDate":"2026-11-10"},{"memberId":"5","startDate":"2026-11-17"},{"memberId":"2","startDate":"2026-11-24"},{"memberId":"1","startDate":"2026-12-01"},{"memberId":"3","startDate":"2026-12-08"},{"memberId":"5","startDate":"2026-12-15"},{"memberId":"3","startDate":"2026-12-22"},{"memberId":"2","startDate":"2026-12-29"}]};
var dayMap={};
function parseDate(s){var x=s.split("-");return new Date(+x[0],+x[1]-1,+x[2]);}
function dateKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function buildDayMap(){dayMap={};DATA.schedules.forEach(function(s){var st=parseDate(s.startDate);for(var i=0;i<7;i++){var d=new Date(st);d.setDate(d.getDate()+i);dayMap[dateKey(d)]=s.memberId;}});}
buildDayMap();
function getMembers(){var m={};DATA.teamMembers.forEach(function(x){m[x.id]=x;});return m;}
function colorAlpha(hex,a){hex=hex.replace("#","");if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return"rgba("+parseInt(hex.slice(0,2),16)+","+parseInt(hex.slice(2,4),16)+","+parseInt(hex.slice(4,6),16)+","+a+")";}
var DAYS=["L","M","M","J","V","S","D"];
var DAYS_FULL=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
var MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
function render(){
  var members=getMembers();
  document.getElementById("month-title").textContent=MONTHS[curMonth]+" "+curYear;
  var isMobile=window.innerWidth<480;
  var grid=document.getElementById("cal-grid");grid.innerHTML="";
  (isMobile?DAYS:DAYS_FULL).forEach(function(d){var el=document.createElement("div");el.className="day-label";el.textContent=d;grid.appendChild(el);});
  var first=new Date(curYear,curMonth,1);
  var startDow=(first.getDay()+6)%7;
  var totalDays=new Date(curYear,curMonth+1,0).getDate();
  var prevDays=new Date(curYear,curMonth,0).getDate();
  var todayKey=dateKey(TODAY);
  for(var i=0;i<startDow;i++)grid.appendChild(makeCell(new Date(curYear,curMonth-1,prevDays-startDow+1+i),true,todayKey,members));
  for(var d=1;d<=totalDays;d++)grid.appendChild(makeCell(new Date(curYear,curMonth,d),false,todayKey,members));
  var rem=(7-(startDow+totalDays)%7)%7;
  for(var i=1;i<=rem;i++)grid.appendChild(makeCell(new Date(curYear,curMonth+1,i),true,todayKey,members));
  renderLegend(members);
}
function makeCell(date,otherMonth,todayKey,members){
  var cell=document.createElement("div");
  var dk=dateKey(date);
  cell.className="day-cell"+(otherMonth?" other-month":"")+(dk===todayKey?" today":"");
  var num=document.createElement("div");num.className="day-num";num.textContent=date.getDate();cell.appendChild(num);
  var mid=dayMap[dk];
  if(mid&&members[mid]){
    var m=members[mid];
    var badge=document.createElement("div");badge.className="week-badge";
    var isMobile=window.innerWidth<480;
    badge.textContent=isMobile?m.name.substring(0,3):m.name;
    badge.style.background=colorAlpha(m.color,0.12);
    badge.style.color=m.color;
    cell.appendChild(badge);
  }
  return cell;
}
function renderLegend(members){
  var leg=document.getElementById("legend");leg.innerHTML="";
  Object.values(members).forEach(function(m){
    var item=document.createElement("div");item.className="leg-item";
    var dot=document.createElement("div");dot.className="leg-dot";dot.style.background=m.color;
    var lbl=document.createElement("span");lbl.textContent=m.name;
    item.appendChild(dot);item.appendChild(lbl);leg.appendChild(item);
  });
}
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}render();}
window.addEventListener("resize",render);
render();
</script>
</body></html>
