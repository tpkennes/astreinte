<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Calendrier Astreintes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a18;padding:1rem}
.wrap{max-width:780px;margin:0 auto}

/* Setup */
#setup{background:#fff;border-radius:16px;padding:2rem 1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.07);text-align:center}
#setup .setup-icon{font-size:36px;margin-bottom:.75rem}
#setup h2{font-size:18px;font-weight:600;margin-bottom:.4rem}
#setup .setup-sub{font-size:13px;color:#888780;margin-bottom:1.75rem;line-height:1.6}
.setup-step{margin-bottom:1.5rem;text-align:left}
.setup-step label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;margin-bottom:8px}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#1a1a18;color:#fff;font-size:11px;font-weight:600;flex-shrink:0}
.drop-zone{border:1.5px dashed #b4b2a9;border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;font-size:13px;color:#5f5e5a}
.drop-zone:hover,.drop-zone.drag-over{border-color:#10B981;background:#f0fdf8}
.drop-zone input{display:none}
.dz-loaded{color:#10B981;font-weight:500}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.member-btn{background:#fff;border:1.5px solid #d3d1c7;border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:8px;width:100%;-webkit-tap-highlight-color:transparent}
.member-btn:hover{border-color:#888780}
.member-btn.selected{border-color:var(--mc);background:var(--mc-bg)}
.member-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.member-fname{font-size:13px;font-weight:500;line-height:1.3}
.member-lname{font-size:11px;color:#888780}
.btn-start{background:#1a1a18;color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;width:100%;margin-top:.25rem;-webkit-tap-highlight-color:transparent}
.btn-start:hover{opacity:.85}
.btn-start:disabled{opacity:.35;cursor:not-allowed}

/* Topbar */
#topbar{display:none;background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tb-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.topbar-who{display:flex;align-items:center;gap:7px;flex:1;font-size:14px;font-weight:500;min-width:0}
.topbar-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tb-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-status{font-size:11px;color:#10B981;font-weight:500;white-space:nowrap}
.tb-row2{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tb-btn{background:none;border:1px solid #d3d1c7;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;color:#5f5e5a;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex:1;text-align:center}
.tb-btn:hover{background:#f1efe8}
.tb-btn.accent{border-color:#10B981;color:#10B981}
.tb-btn.accent:hover{background:#f0fdf8}
.tb-btn.admin{border-color:#d3d1c7;color:#b4b2a9}
.tb-btn.admin:hover{background:#f1efe8;color:#5f5e5a}

/* Calendar */
#calendar-card{background:#fff;border-radius:16px;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.07);display:none}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.nav-btn{background:none;border:1px solid #d3d1c7;border-radius:8px;padding:8px 14px;cursor:pointer;color:#1a1a18;font-size:13px;transition:background .15s;-webkit-tap-highlight-color:transparent;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#f1efe8}
.month-title{font-size:16px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-label{font-size:10px;color:#888780;text-align:center;padding:3px 0;font-weight:500}
.day-cell{border-radius:6px;border:0.5px solid #d3d1c7;padding:4px 4px 3px;position:relative;background:#fff;min-height:52px}
.day-cell.other-month{opacity:.3}
.day-cell.today{border-color:#1a1a18;border-width:1.5px}
.day-num{font-size:11px;color:#888780;margin-bottom:3px;font-weight:500;line-height:1}
.day-cell.today .day-num{color:#185fa5;font-weight:600}
.week-badge{font-size:9px;font-weight:500;border-radius:3px;padding:2px 3px;display:block;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mine{border:1.5px solid}
.leave-dot{width:4px;height:4px;border-radius:50%;background:#F59E0B;position:absolute;top:4px;right:4px}
@media(min-width:480px){.cal-grid{gap:4px}.day-cell{min-height:62px;padding:5px 5px 4px}.day-num{font-size:12px;margin-bottom:4px}.week-badge{font-size:10px;padding:2px 4px}.day-label{font-size:11px}}
@media(min-width:640px){.day-cell{min-height:70px;padding:6px 6px 4px}.week-badge{font-size:11px}}
.bottom{display:flex;flex-direction:column;gap:8px;margin-top:.875rem}
@media(min-width:520px){.bottom{flex-direction:row;align-items:center;flex-wrap:wrap}}
.next-badge{background:#e6f1fb;color:#185fa5;border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.5;flex:1}
.next-badge strong{font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:.875rem}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#5f5e5a}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:.4rem}
.modal p{font-size:13px;color:#888780;margin-bottom:1.25rem;line-height:1.5}
.modal-row{display:flex;gap:8px;margin-bottom:1rem}
.modal-field{flex:1}
.modal-field label{display:block;font-size:12px;color:#888780;margin-bottom:4px;font-weight:500}
.modal-field select{width:100%;border:1px solid #d3d1c7;border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a18;background:#fff;cursor:pointer}
.modal-actions{display:flex;gap:8px;margin-top:.5rem}
.modal-cancel{flex:1;background:none;border:1px solid #d3d1c7;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;color:#5f5e5a}
.modal-cancel:hover{background:#f1efe8}
.modal-confirm{flex:2;background:#1a1a18;color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;font-weight:500}
.modal-confirm:hover{opacity:.85}

/* PIN */
.pin-dots{display:flex;justify-content:center;gap:12px;margin:1.25rem 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d3d1c7;transition:background .15s,border-color .15s}
.pin-dot.filled{background:#1a1a18;border-color:#1a1a18}
.pin-dot.error{background:#E24B4A;border-color:#E24B4A}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.pin-key{background:#f5f5f3;border:none;border-radius:10px;padding:14px;font-size:18px;font-weight:500;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.pin-key:hover{background:#e8e7e0}
.pin-key:active{background:#d3d1c7}
.pin-error{text-align:center;font-size:12px;color:#E24B4A;margin-top:.5rem;min-height:18px}
</style>
</head>
<body>
<div class="wrap">

  <!-- SETUP -->
  <div id="setup">
    <div class="setup-icon">&#128197;</div>
    <h2>Calendrier Astreintes</h2>
    <p class="setup-sub">Premi&#232;re utilisation &#8212; configure ton espace en 2 &#233;tapes.<br>Ces r&#233;glages seront m&#233;moris&#233;s pour les prochaines ouvertures.</p>
    <div class="setup-step">
      <label><span class="step-num">1</span>Charge le fichier JSON export&#233; depuis l'outil d'astreinte</label>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="file-input" accept=".json,application/json" onchange="onFileChange(event)">
        <span id="dz-label">&#128194; Clique ici ou glisse ton fichier JSON</span>
      </div>
    </div>
    <div class="setup-step">
      <label><span class="step-num">2</span>Qui es-tu ?</label>
      <div class="member-grid" id="member-grid">
        <p style="font-size:13px;color:#b4b2a9;grid-column:1/-1">Charge d'abord le fichier JSON&#8230;</p>
      </div>
    </div>
    <button class="btn-start" id="btn-start" disabled onclick="startApp()">D&#233;marrer &#8594;</button>
  </div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-row1">
      <div class="topbar-who">
        <span class="topbar-dot" id="tb-dot"></span>
        <span class="tb-name" id="tb-name"></span>
      </div>
      <span class="tb-status" id="tb-status"></span>
    </div>
    <div class="tb-row2">
      <button class="tb-btn admin" onclick="askPin(resetApp)">&#9881; Reconfigurer</button>
      <button class="tb-btn admin" onclick="askPin(reloadJSON)">&#8634; Nouveau JSON</button>
      <button class="tb-btn accent" onclick="saveDynamic()">&#11015; Exporter en dynamique</button>
      <button class="tb-btn" onclick="openModal('static')">&#128241; Exporter en statique (iOS)</button>
      <button class="tb-btn" onclick="openModal('ics')">&#128198; Exporter en .ics</button>
    </div>
    <input type="file" id="reload-input" accept=".json,application/json" style="display:none" onchange="onReloadFile(event)">
  </div>

  <!-- CALENDAR -->
  <div id="calendar-card">
    <div class="card-title" id="card-title"></div>
    <div class="nav-row">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-title" id="month-title"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="bottom">
      <div class="next-badge" id="next-info"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

</div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="pin-modal">
  <div class="modal" style="text-align:center">
    <h3>Code PIN requis</h3>
    <p>Cette action est prot&#233;g&#233;e.</p>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
      <div class="pin-dot" id="pd4"></div>
      <div class="pin-dot" id="pd5"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key" onclick="pinKey('DEL')" style="font-size:14px">&#8592;</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key" onclick="closePinModal()" style="font-size:12px;color:#888780">&#10005;</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- RANGE PICKER MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <div class="modal-row">
      <div class="modal-field">
        <label>Mois de d&#233;but</label>
        <select id="sel-start-month"></select>
      </div>
      <div class="modal-field">
        <label>Ann&#233;e</label>
        <select id="sel-start-year"></select>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>Mois de fin</label>
        <select id="sel-end-month"></select>
      </div>
      <div class="modal-field">
        <label>Ann&#233;e</label>
        <select id="sel-end-year"></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-confirm" id="modal-confirm-btn">G&#233;n&#233;rer</button>
    </div>
  </div>
</div>

<script>
// \u2699\uFE0F CODE PIN ADMIN \u2014 modifier ici
const ADMIN_PIN = '422000';

const STORAGE_KEY='astreinte_conf';
const TODAY=new Date();
let curYear=TODAY.getFullYear(),curMonth=TODAY.getMonth();
let DATA=null,MY_ID=null,dayMap={};
let pendingData=null,selectedId=null;
let modalMode=null;

const MONTHS_FR=['Janvier','F\u00E9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00FBt','Septembre','Octobre','Novembre','D\u00E9cembre'];
const DAYS_SHORT=['L','M','M','J','V','S','D'];
const DAYS_FULL=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

/* Boot */
function boot(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){try{const c=JSON.parse(saved);if(c.data&&c.myId){DATA=c.data;MY_ID=c.myId;buildDayMap();showApp(c.updatedAt);return;}}catch(e){}}
  showSetup();
}
function showSetup(){
  document.getElementById('setup').style.display='block';
  document.getElementById('topbar').style.display='none';
  document.getElementById('calendar-card').style.display='none';
}
function showApp(updatedAt){
  document.getElementById('setup').style.display='none';
  document.getElementById('topbar').style.display='block';
  document.getElementById('calendar-card').style.display='block';
  const members=getMembers(),me=members[MY_ID];
  document.getElementById('tb-dot').style.background=me?me.color:'#888';
  document.getElementById('tb-name').textContent=me?me.name:'';
  document.title='Astreintes \u2013 '+(me?me.name.split(' ')[0]:'');
  if(updatedAt){const d=new Date(updatedAt);document.getElementById('tb-status').textContent='JSON du '+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
  render();
}

/* PIN */
let pinBuffer='';
let pinCallback=null;
function askPin(callback){
  pinBuffer='';pinCallback=callback;
  document.getElementById('pin-error').textContent='';
  updatePinDots();
  document.getElementById('pin-modal').classList.add('open');
}
function closePinModal(){
  document.getElementById('pin-modal').classList.remove('open');
  pinBuffer='';pinCallback=null;
  updatePinDots();
}
function pinKey(k){
  if(k==='DEL'){pinBuffer=pinBuffer.slice(0,-1);}
  else if(pinBuffer.length<6){pinBuffer+=k;}
  updatePinDots();
  if(pinBuffer.length===6){
    if(pinBuffer===ADMIN_PIN){
      const cb=pinCallback;
      closePinModal();
      if(cb)cb();
    } else {
      document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
      document.getElementById('pin-error').textContent='Code incorrect';
      setTimeout(()=>{
        pinBuffer='';
        updatePinDots();
        document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'));
        document.getElementById('pin-error').textContent='';
      },800);
    }
  }
}
function updatePinDots(){
  for(let i=0;i<6;i++){
    const dot=document.getElementById('pd'+i);
    dot.classList.toggle('filled',i<pinBuffer.length);
    dot.classList.remove('error');
  }
}

/* Setup */
function onDragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('drag-over');}
function onDragLeave(){document.getElementById('drop-zone').classList.remove('drag-over');}
function onDrop(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)loadSetupFile(f);}
function onFileChange(e){const f=e.target.files[0];if(f)loadSetupFile(f);}
function loadSetupFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const json=JSON.parse(e.target.result);
      if(!json.schedules||!json.teamMembers)throw new Error();
      pendingData=json;
      document.getElementById('dz-label').innerHTML='<span class="dz-loaded">\u2713 '+file.name+'</span>';
      document.getElementById('drop-zone').style.borderColor='#10B981';
      buildMemberGrid(json.teamMembers);checkReady();
    }catch{
      document.getElementById('dz-label').textContent='\u26A0 Fichier invalide, r\u00E9essaie';
      document.getElementById('drop-zone').style.borderColor='#E24B4A';
    }
  };
  reader.readAsText(file);
}
function buildMemberGrid(members){
  const grid=document.getElementById('member-grid');grid.innerHTML='';
  members.forEach(m=>{
    const btn=document.createElement('button');btn.className='member-btn';btn.dataset.id=m.id;
    const[first,...rest]=m.name.split(' ');
    btn.style.setProperty('--mc',m.color);btn.style.setProperty('--mc-bg',colorAlpha(m.color,0.08));
    btn.innerHTML='<span class="member-dot" style="background:'+m.color+'"></span><span><span class="member-fname">'+first+'</span><br><span class="member-lname">'+rest.join(' ')+'</span></span>';
    btn.onclick=()=>selectMember(m.id);grid.appendChild(btn);
  });
}
function selectMember(id){selectedId=id;document.querySelectorAll('.member-btn').forEach(b=>b.classList.toggle('selected',b.dataset.id===id));checkReady();}
function checkReady(){document.getElementById('btn-start').disabled=!(pendingData&&selectedId);}
function startApp(){
  DATA=pendingData;MY_ID=selectedId;buildDayMap();
  const conf={data:DATA,myId:MY_ID,updatedAt:new Date().toISOString()};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(conf));showApp(conf.updatedAt);
}
function reloadJSON(){document.getElementById('reload-input').click();}
function onReloadFile(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const json=JSON.parse(e.target.result);
      if(!json.schedules||!json.teamMembers)throw new Error();
      DATA=json;buildDayMap();
      const now=new Date().toISOString();
      localStorage.setItem(STORAGE_KEY,JSON.stringify({data:DATA,myId:MY_ID,updatedAt:now}));
      const d=new Date(now);document.getElementById('tb-status').textContent='JSON du '+d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
      render();
    }catch{alert('Fichier JSON invalide.');}
  };
  reader.readAsText(f);e.target.value='';
}
function resetApp(){
  if(confirm('Reconfigurer effacera les r\u00E9glages sauvegard\u00E9s. Continuer ?')){
    localStorage.removeItem(STORAGE_KEY);DATA=null;MY_ID=null;pendingData=null;selectedId=null;
    document.getElementById('dz-label').textContent='\uD83D\uDCC2 Clique ici ou glisse ton fichier JSON';
    document.getElementById('drop-zone').style.borderColor='';
    document.getElementById('member-grid').innerHTML='<p style="font-size:13px;color:#b4b2a9;grid-column:1/-1">Charge d\'abord le fichier JSON\u2026</p>';
    document.getElementById('btn-start').disabled=true;showSetup();
  }
}

/* Modal range picker */
function openModal(mode){
  modalMode=mode;
  document.getElementById('modal-title').textContent=mode==='ics'?'Exporter en .ics':'Exporter en statique (iOS)';
  document.getElementById('modal-desc').textContent=mode==='ics'?'Choisis la plage de mois \u00E0 inclure dans le fichier .ics.':'Choisis la plage de mois \u00E0 afficher dans le fichier HTML statique.';
  document.getElementById('modal-confirm-btn').textContent=mode==='ics'?'G\u00E9n\u00E9rer le .ics':'G\u00E9n\u00E9rer le HTML';
  const years=new Set();DATA.schedules.forEach(s=>{years.add(parseInt(s.startDate.split('-')[0]));});
  const minYear=Math.min(...years),maxYear=Math.max(...years);
  ['sel-start-month','sel-end-month'].forEach(id=>{const sel=document.getElementById(id);sel.innerHTML='';MONTHS_FR.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;sel.appendChild(o);});});
  ['sel-start-year','sel-end-year'].forEach(id=>{const sel=document.getElementById(id);sel.innerHTML='';for(let y=minYear;y<=maxYear;y++){const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);}});
  document.getElementById('sel-start-month').value=TODAY.getMonth();
  document.getElementById('sel-start-year').value=TODAY.getFullYear();
  const lastSchedule=DATA.schedules[DATA.schedules.length-1];
  const lastDate=lastSchedule?lastSchedule.startDate.split('-'):null;
  document.getElementById('sel-end-month').value=lastDate?parseInt(lastDate[1])-1:11;
  document.getElementById('sel-end-year').value=lastDate?parseInt(lastDate[0]):maxYear;
  document.getElementById('modal-confirm-btn').onclick=()=>{
    const sm=parseInt(document.getElementById('sel-start-month').value);
    const sy=parseInt(document.getElementById('sel-start-year').value);
    const em=parseInt(document.getElementById('sel-end-month').value);
    const ey=parseInt(document.getElementById('sel-end-year').value);
    if(sy>ey||(sy===ey&&sm>em)){alert('Le mois de d\u00E9but doit \u00EAtre avant le mois de fin.');return;}
    closeModal();
    if(modalMode==='ics')doExportICS(sm,sy,em,ey);
    else doExportStatic(sm,sy,em,ey);
  };
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('pin-modal').addEventListener('click',function(e){if(e.target===this)closePinModal();});

/* Helpers */
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function buildDayMap(){dayMap={};DATA.schedules.forEach(s=>{const start=parseDate(s.startDate);for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);dayMap[dateKey(d)]=s.memberId;}});}
function getMembers(){const m={};DATA.teamMembers.forEach(x=>m[x.id]=x);return m;}
function getMyLeaves(){return(DATA.leaves||[]).filter(l=>l.memberId===MY_ID);}
function isLeaveDay(d){const k=parseDate(dateKey(d));return getMyLeaves().some(l=>{const s=parseDate(l.startDate),e=parseDate(l.endDate);return k>=s&&k<=e;});}
function colorAlpha(hex,a){hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return'rgba('+parseInt(hex.slice(0,2),16)+','+parseInt(hex.slice(2,4),16)+','+parseInt(hex.slice(4,6),16)+','+a+')';}

/* Render */
function render(){
  const members=getMembers(),me=members[MY_ID];
  document.getElementById('card-title').textContent='Calendrier Astreintes \u2013 '+(me?me.name:'');
  document.getElementById('month-title').textContent=MONTHS_FR[curMonth]+' '+curYear;
  const isMobile=window.innerWidth<480;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  (isMobile?DAYS_SHORT:DAYS_FULL).forEach(d=>{const el=document.createElement('div');el.className='day-label';el.textContent=d;grid.appendChild(el);});
  const first=new Date(curYear,curMonth,1);
  const startDow=(first.getDay()+6)%7;
  const totalDays=new Date(curYear,curMonth+1,0).getDate();
  const prevDays=new Date(curYear,curMonth,0).getDate();
  const todayKey=dateKey(TODAY);
  for(let i=0;i<startDow;i++)grid.appendChild(makeCell(new Date(curYear,curMonth-1,prevDays-startDow+1+i),true,todayKey,members));
  for(let d=1;d<=totalDays;d++)grid.appendChild(makeCell(new Date(curYear,curMonth,d),false,todayKey,members));
  const rem=(7-(startDow+totalDays)%7)%7;
  for(let i=1;i<=rem;i++)grid.appendChild(makeCell(new Date(curYear,curMonth+1,i),true,todayKey,members));
  renderNext();renderLegend(members);
}
function makeCell(date,otherMonth,todayKey,members){
  const cell=document.createElement('div');
  const dk=dateKey(date);
  cell.className='day-cell'+(otherMonth?' other-month':'')+(dk===todayKey?' today':'');
  const num=document.createElement('div');num.className='day-num';num.textContent=date.getDate();cell.appendChild(num);
  const mid=dayMap[dk];
  if(mid&&members[mid]){
    const m=members[mid],me=members[MY_ID],myFirst=me?me.name.split(' ')[0]:'';
    const badge=document.createElement('div');
    badge.className='week-badge'+(mid===MY_ID?' mine':'');
    const isMobile=window.innerWidth<480;
    badge.textContent=mid===MY_ID?myFirst:(isMobile?m.name.split(' ')[0].substring(0,3):m.name.split(' ')[0]);
    badge.style.background=colorAlpha(m.color,mid===MY_ID?0.18:0.1);
    badge.style.color=m.color;
    if(mid===MY_ID)badge.style.borderColor=m.color;
    cell.appendChild(badge);
  }
  if(mid===MY_ID&&isLeaveDay(date)){const dot=document.createElement('div');dot.className='leave-dot';cell.appendChild(dot);}
  return cell;
}
function renderNext(){
  const el=document.getElementById('next-info');
  const now=new Date();now.setHours(0,0,0,0);
  const future=DATA.schedules.filter(s=>s.memberId===MY_ID).map(s=>({...s,d:parseDate(s.startDate)})).filter(s=>s.d>=now).sort((a,b)=>a.d-b.d);
  if(!future.length){el.textContent='Aucune astreinte future.';return;}
  const next=future[0];const end=new Date(next.d);end.setDate(end.getDate()+6);
  const fmt=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  const fmtFull=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const isCur=next.d<=now&&now<=end;
  const diff=Math.round((next.d-now)/86400000);
  el.innerHTML=isCur?'<strong>En cours</strong> \u2014 jusqu\'au '+fmtFull(end)+'.':'<strong>Prochaine</strong> \u2014 du '+fmt(next.d)+' au '+fmtFull(end)+' (dans '+diff+' j)';
}
function renderLegend(members){
  const leg=document.getElementById('legend');leg.innerHTML='';
  Object.values(members).forEach(m=>{
    const item=document.createElement('div');item.className='leg-item';
    const dot=document.createElement('div');dot.className='leg-dot';dot.style.background=m.color;
    const lbl=document.createElement('span');lbl.textContent=(m.id===MY_ID?'\u2605 ':'')+m.name.split(' ')[0];
    item.appendChild(dot);item.appendChild(lbl);leg.appendChild(item);
  });
  if(getMyLeaves().length){
    const item=document.createElement('div');item.className='leg-item';
    const dot=document.createElement('div');dot.className='leg-dot';dot.style.background='#F59E0B';
    const lbl=document.createElement('span');lbl.textContent='Cong\u00E9';
    item.appendChild(dot);item.appendChild(lbl);leg.appendChild(item);
  }
}
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}render();}
window.addEventListener('resize',()=>{if(DATA)render();});

  const genDate=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})+' \u00E0 '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  let monthsHTML='';

function buildMonthHTML(y,m,members){
  const todayKey=dateKey(TODAY);
  const first=new Date(y,m,1);
  const startDow=(first.getDay()+6)%7;
  const totalDays=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const DAYS=['L','M','M','J','V','S','D'];
  let html='<div class="month-block">';
  html+='<div class="month-title">'+MONTHS_FR[m]+' '+y+'</div>';
  html+='<div class="cal-grid">';
  DAYS.forEach(d=>{html+='<div class="day-label">'+d+'</div>';});
  const renderCell=(date,otherMonth)=>{
    const dk2=dateKey(date);
    const isToday=dk2===todayKey;
    let cls='day-cell'+(otherMonth?' other-month':'')+(isToday?' today':'');
    let inner='<div class="day-num">'+date.getDate()+'</div>';
    const mid=dayMap[dk2];
    if(mid&&members[mid]){
      const mbr=members[mid];
      inner+='<div class="week-badge" style="background:'+colorAlpha(mbr.color,0.12)+';color:'+mbr.color+'">'+mbr.name.split(' ')[0]+'</div>';
    }
    html+='<div class="'+cls+'">'+inner+'</div>';
  };
  for(let i=0;i<startDow;i++)renderCell(new Date(y,m-1,prevDays-startDow+1+i),true);
  for(let d=1;d<=totalDays;d++)renderCell(new Date(y,m,d),false);
  const rem=(7-(startDow+totalDays)%7)%7;
  for(let i=1;i<=rem;i++)renderCell(new Date(y,m+1,i),true);
  html+='</div></div>';
  return html;
}
function buildLegendHTML(members){
  let html='<div class="legend">';
  Object.values(members).forEach(m=>{html+='<div class="leg-item"><div class="leg-dot" style="background:'+m.color+'"></div><span>'+m.name.split(' ')[0]+'</span></div>';});
  html+='</div>';
  return html;
}

/* Export ICS */
function doExportICS(sm,sy,em,ey){
  const members=getMembers();
  const name=members[MY_ID]?members[MY_ID].name:'Moi';
  const startLimit=new Date(sy,sm,1);
  const endLimit=new Date(ey,em+1,0);
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Astreinte//FR\r\nCALSCALE:GREGORIAN\r\n';
  DATA.schedules.filter(s=>{
    if(s.memberId!==MY_ID)return false;
    const d=parseDate(s.startDate);return d>=startLimit&&d<=endLimit;
  }).forEach((s,i)=>{
    const start=parseDate(s.startDate);const end=new Date(start);end.setDate(end.getDate()+7);
    const fmt=d=>d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
    ics+='BEGIN:VEVENT\r\nUID:astreinte-'+MY_ID+'-'+i+'@edt\r\n';
    ics+='DTSTART;VALUE=DATE:'+fmt(start)+'\r\nDTEND;VALUE=DATE:'+fmt(end)+'\r\n';
    ics+='SUMMARY:\uD83D\uDD27 Astreinte - '+name+'\r\nDESCRIPTION:Semaine d\'astreinte\r\nEND:VEVENT\r\n';
  });
  ics+='END:VCALENDAR';
  dl(ics,'astreintes.ics','text/calendar');
}

function dl(content,filename,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=filename;a.click();}
